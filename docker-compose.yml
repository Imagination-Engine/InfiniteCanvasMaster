version: "3.4"

services:
  # ---------------------------------------------------------
  # LibreChat - The Temporal Shell
  # ---------------------------------------------------------
  api:
    image: ghcr.io/danny-avila/librechat-dev:latest
    container_name: LibreChat
    ports:
      - "3080:3080"
    depends_on:
      - mongodb
      - meilisearch
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOST=0.0.0.0
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=Draculinchen
      - CONFIG_PATH=/app/librechat.yaml
      - ENDPOINTS=open_ai,anthropic,google
      - ALLOW_IFRAME=true
      - JWT_SECRET=super-secret-librechat-key
      - CREDS_KEY=f34be427ebb29de8d88c107a71546019685ed8b241d8f2ed00a0efb3365df8f5
      - CREDS_IV=e2341419ea3815c48b2645eb4516db8a
      # Students will inject their own keys via .env
    volumes:
      - type: bind
        source: ./librechat.yaml
        target: /app/librechat.yaml
      - ./images:/app/client/public/images
      - ./logs:/app/api/logs
      - ./packages/core/dist:/workspace/packages/core/dist

  mongodb:
    container_name: chat-mongodb
    image: mongo:6
    restart: always
    volumes:
      - ./data-node:/data/db
    command: mongod --noauth

  meilisearch:
    container_name: chat-meilisearch
    image: getmeili/meilisearch:v1.7.3
    restart: always
    environment:
      - MEILI_MASTER_KEY=Draculinchen
      - MEILI_NO_ANALYTICS=true
    volumes:
      - ./meili_data_v1.7:/meili_data

  # ---------------------------------------------------------
  # OpenTelemetry - Jaeger
  # ---------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: iem-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # ---------------------------------------------------------
  # Imagination Engine - The Substrate & MCP Server
  # ---------------------------------------------------------
  iem-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: iem-mcp-server
    environment:
      - NODE_ENV=development
      - MCP_TRANSPORT=sse
      - PORT=3002
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "3002:3002"
    volumes:
      - .:/workspace

  # ---------------------------------------------------------
  # Relational Database - PostgreSQL
  # ---------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: iem-postgres
    restart: always
    environment:
      - POSTGRES_DB=imagination_canvas
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
