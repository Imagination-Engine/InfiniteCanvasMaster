version: 1.1.4

cache: true

endpoints:
  custom:
    - name: "Imagination Engine"
      apiKey: "${GEMINI_API_KEY}" # Uses Gemini as the reasoning engine for the tools
      baseURL: "https://generativelanguage.googleapis.com/v1beta/openai/"
      models:
        default: ["gemini-2.5-pro"]
        fetch: false

mcpServers:
  imagination-engine:
    # This instructs LibreChat to boot our CLI and bind to its stdio streams
    type: stdio
    command: node
    args:
      - /workspace/packages/core/dist/mcp/cli.js
